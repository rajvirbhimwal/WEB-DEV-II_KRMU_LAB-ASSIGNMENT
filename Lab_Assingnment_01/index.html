<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Dashboard</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-badge">
            <span class="icon"></span> Smart Event Dashboard
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <h2>Add New Event</h2>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventTitle">Event Title:</label>
                    <input type="text" id="eventTitle" placeholder="Enter title" required>
                </div>

                <div class="form-group">
                    <label for="eventDate">Event Date:</label>
                    <input type="date" id="eventDate" required>
                </div>

                <div class="form-group">
                    <label for="eventCategory">Category:</label>
                    <select id="eventCategory">
                        <option value="Conference">Conference</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Meetup">Meetup</option>
                        <option value="Webinar">Webinar</option>
                        <option value="Party">Party</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="eventDesc">Description:</label>
                    <textarea id="eventDesc" placeholder="Brief description"></textarea>
                </div>

                <button type="submit" class="btn btn-add">Add Event</button>
            </form>
        </div>

        <div class="panel">
            <h2>My Events</h2>
            <div class="action-buttons">
                <button class="btn btn-clear" id="clearBtn">Clear All Events</button>
                <button class="btn btn-sample" id="sampleBtn">Add Sample Events</button>
            </div>

            <div id="eventList">
                <p class="empty-state">No events yet. Add your first event!</p>
            </div>
        </div>
    </div>

</body>
</html>
